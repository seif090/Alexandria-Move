version: '3.8'

services:
  api:
    image: alexandria-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings:DefaultConnection=Server=db;Database=AlexandriaDb;User Id=sa;Password=Alex@123456;TrustServerCertificate=True;MultipleActiveResultSets=true
      - Jwt:Secret=Y29tcGxleC1zZWNyZXQta2V5LWZvci1hbGV4YW5kcmlhLXBsYXRmb3JtLTIwMjQ=
      - Jwt:Issuer=AlexandriaAPI
      - Jwt:Audience=AlexandriaClients
      - Cors:AllowedOrigins__0=http://localhost:3000
      - Cors:AllowedOrigins__1=http://web
      - FileStorage:Path=/app/Uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/Uploads
      - logs:/app/logs
    restart: unless-stopped
    networks:
      - alexandria-network

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Alex@123456
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Alex@123456" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - alexandria-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - alexandria-network

  web:
    image: alexandria-web:latest
    build:
      context: ../web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=/api
      - VITE_SIGNALR_URL=/hubs
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - alexandria-network

volumes:
  sqldata:
  redis-data:
  uploads:
  logs:

networks:
  alexandria-network:
    driver: bridge
